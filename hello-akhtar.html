<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello Akhtar</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f8f9fa;
      color: #212529;
      padding: 1rem;
    }
    .card {
      max-width: 42rem;
      width: 100%;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      padding: 1.25rem 1.5rem;
    }
    .message {
      font-size: 1.75rem;
      margin: 0;
      padding-bottom: .75rem;
    }

    /* thoughts styles (added) */
    .thoughts {
      margin-top: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      background: linear-gradient(180deg,#fffefc,#f7fbff);
      box-shadow: 0 2px 8px rgba(10,20,40,0.06);
      font-size: 1rem;
      line-height: 1.5;
      color: #333;
    }
    .thoughts h2 { margin: 0 0 .5rem 0; font-size:1.05rem; }
    .thoughts ul { margin: 0; padding-left: 1.25rem; }
    .thoughts li { margin: .35rem 0; }
    .muted { color: #6c757d; font-size: .9rem; }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="greeting">
    <p id="greeting" class="message">Hello Akhtar — good afternoon?</p>

    <section class="thoughts" aria-labelledby="thoughts-heading">
      <h2 id="thoughts-heading">A few great thoughts</h2>
      <ul>
        <li>"Small steps every day lead to big changes." <span class="muted">— Progress</span></li>
        <li>"Curiosity opens doors; persistence keeps them open." <span class="muted">— Growth</span></li>
        <li>"Kindness and clarity make work and life better for everyone." <span class="muted">— Community</span></li>
      </ul>
    </section>
  </main>
</body>
</html>
